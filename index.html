<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Gracie's Nails — Handcrafted Press-On Nails</title>
    <meta name="description" content="Handcrafted press-on nails by Gracie's Nails. Salon-quality designs shipped to your door." />
    <meta name="author" content="Gracie's Nails" />

    <meta property="og:title" content="Gracie's Nails — Handcrafted Press-On Nails" />
    <meta property="og:description" content="Handcrafted press-on nails by Gracie's Nails. Salon-quality designs shipped to your door." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden form for Netlify Forms detection at build time -->
    <form name="nail-order" netlify netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="Name" />
      <input type="email" name="Email" />
      <input type="text" name="CashApp_Username" />
      <input type="text" name="Shipping_Address" />
      <input type="text" name="Order_Total" />
      <input type="text" name="Items_Ordered" />
      <input type="text" name="Custom_Nail_Description" />
      <input type="file" name="Hand_Photo_1" />
      <input type="file" name="Hand_Photo_2" />
      <input type="file" name="Inspiration_Photo_1" />
      <input type="file" name="Inspiration_Photo_2" />
      <input type="file" name="Inspiration_Photo_3" />
    </form>
  </body>
</html>
